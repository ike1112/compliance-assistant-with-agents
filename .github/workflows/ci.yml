name: ci

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --extra infra

      - name: Run tests
        run: uv run --no-sync python -m pytest tests infra/tests -q
        env:
          PYTHONPATH: src

      - name: Run offline eval gate
        run: uv run --no-sync python -m pytest tests/evals -m gate -q
        env:
          PYTHONPATH: src

      - name: Synthesize CDK templates
        run: uv run --no-sync --directory infra npx --yes aws-cdk@latest synth ComplianceObservabilityStack ComplianceKbStack ComplianceAgentStack ComplianceRuntimeEcrStack ComplianceRuntimeStack -q

      - name: Run cfn-lint
        shell: bash
        run: |
          uv run --no-sync cfn-lint --non-zero-exit-code error -r us-east-1 -t infra/cdk.out/ComplianceKbStack.template.json
          uv run --no-sync cfn-lint --non-zero-exit-code error -r us-east-1 -t infra/cdk.out/ComplianceAgentStack.template.json
          uv run --no-sync cfn-lint --non-zero-exit-code error -r us-east-1 -t infra/cdk.out/ComplianceRuntimeEcrStack.template.json
          uv run --no-sync cfn-lint --non-zero-exit-code error -r us-east-1 -t infra/cdk.out/ComplianceRuntimeStack.template.json
          uv run --no-sync cfn-lint --non-zero-exit-code error -r us-east-1 -t infra/cdk.out/ComplianceObservabilityStack.template.json
